name: Deploy Job Backoffice to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🚀 Starting Deployment for Job-Backoffice..."
            cd /opt/job-platform/job-backoffice
            git pull origin main
            
            echo "⚙️ Rebuilding Backoffice Docker Container..."
            cd /opt/job-platform
            docker compose up -d --build job-admin
            
            echo "🧹 Clearing Backoffice Cache..."
            docker exec job_admin_web php artisan optimize:clear
            
            echo "✅ Deployment Successful!"